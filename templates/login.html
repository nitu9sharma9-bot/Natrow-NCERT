<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — StudyOS</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #08090d; --bg2: #0f1117;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #eeeef0; --muted: rgba(238,238,240,0.45); --muted2: rgba(238,238,240,0.25);
    --accent: #7c6ff7; --green: #22c55e;
    --red: #f87171; --radius: 16px; --radius-sm: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(124,111,247,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(34,197,94,0.08) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
    width: 100%; max-width: 400px; position: relative; z-index: 1;
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-mark { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .logo-mark span { color: var(--accent); }
  .logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .card-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); background: rgba(124,111,247,0.05); }
  .form-input::placeholder { color: var(--muted2); }
  .submit-btn {
    width: 100%; padding: 12px; margin-top: 4px;
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    border: none; border-radius: var(--radius-sm); color: white;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s, transform 0.15s;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .error {
    background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3);
    color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; margin-bottom: 16px;
  }
  .switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .switch a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .switch a:hover { text-decoration: underline; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">Study<span>OS</span></div>
    <div class="logo-sub">JEE 2025 — Your Personal Study Dashboard</div>
  </div>

  <div class="card-title">Welcome back 👋</div>
  <div class="card-sub">Sign in to continue learning</div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username or Email</label>
      <input class="form-input" type="text" name="username" placeholder="Enter your username" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
    </div>
    <button class="submit-btn" type="submit">🚀 Sign In</button>
  </form>

  <div class="switch">
    Don't have an account? <a href="/register">Create one →</a>
  </div>
</div>
</body>
</html>
