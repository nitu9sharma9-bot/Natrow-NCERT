<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — StudyOS</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #08090d; --bg2: #0f1117;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #eeeef0; --muted: rgba(238,238,240,0.45); --muted2: rgba(238,238,240,0.25);
    --accent: #7c6ff7; --green: #22c55e; --red: #f87171;
    --radius: 16px; --radius-sm: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(124,111,247,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(34,197,94,0.08) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
    width: 100%; max-width: 440px; position: relative; z-index: 1;
  }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo-mark { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .logo-mark span { color: var(--accent); }
  .card-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input, .form-select {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); background: rgba(124,111,247,0.05); }
  .form-input::placeholder { color: var(--muted2); }
  .form-select option { background: var(--bg2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .avatar-upload {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: rgba(255,255,255,0.05);
    border: 1px dashed var(--border2); border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s;
  }
  .avatar-upload:hover { border-color: var(--accent); background: rgba(124,111,247,0.05); }
  .avatar-upload input { display: none; }
  .avatar-preview {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .submit-btn {
    width: 100%; padding: 12px; margin-top: 8px;
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    border: none; border-radius: var(--radius-sm); color: white;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s, transform 0.15s;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .error {
    background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3);
    color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; margin-bottom: 16px;
  }
  .switch { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .switch a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">Study<span>OS</span></div>
  </div>

  <div class="card-title">Create your account ✨</div>
  <div class="card-sub">Join StudyOS and start your journey</div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" enctype="multipart/form-data">

    <div class="form-group">
      <label class="form-label">Profile Picture</label>
      <label class="avatar-upload">
        <div class="avatar-preview" id="avatarPreview">👤</div>
        <div>
          <div style="font-size:13px; font-weight:600;">Upload photo</div>
          <div style="font-size:11px; color:var(--muted);">PNG, JPG up to 2MB</div>
        </div>
        <input type="file" name="avatar" accept="image/*" onchange="previewAvatar(this)">
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" name="username" placeholder="e.g. anurag_jee" required>
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" name="email" placeholder="your@email.com" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Min 6 characters" required minlength="6">
    </div>

    <div class="form-group">
      <label class="form-label">Bio</label>
      <input class="form-input" type="text" name="bio" placeholder="e.g. JEE aspirant from Delhi">
    </div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">Target Exam</label>
        <select class="form-select" name="exam">
          <option value="JEE">JEE</option>
          <option value="NEET">NEET</option>
          <option value="UPSC">UPSC</option>
          <option value="CAT">CAT</option>
           <option value="student(class 1 to 12)">student(class 1 to 12)</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">Class</label>
        <select class="form-select" name="class_year">
          <option value="11">Class 11</option>
          <option value="12" selected>Class 12</option>
          <option value="dropper">Dropper</option>
          <option value="graduate">Graduate</option>
        </select>
      </div>
    </div>

    <button class="submit-btn" type="submit" style="margin-top:16px;">🚀 Create Account</button>
  </form>

  <div class="switch">
    Already have an account? <a href="/login">Sign in →</a>
  </div>
</div>

<script>
  function previewAvatar(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        const preview = document.getElementById('avatarPreview');
        preview.innerHTML = `<img src="${e.target.result}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
</body>
</html>
